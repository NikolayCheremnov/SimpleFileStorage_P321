services:
  app:
    container_name: files-app
    build:
      dockerfile: ./SimpleFileStorage/Dockerfile
      context: .
    ports:
      - "80:8080"
    environment:
      - DB_CONNECTION_PROFILE=docker
      - S3_OPTIONS_PROFILE=docker

  postgres:
    container_name: files-db
    image: postgres:18.1
    environment:
      - POSTGRES_DB=files_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"

  minio:
    container_name: files-storage
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
